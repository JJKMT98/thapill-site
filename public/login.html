<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAPILL — Log In</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" type="image/png" sizes="32x32" href="/thapill-assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/thapill-assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 40px 20px;
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--electric), transparent);
  }
  .auth-logo {
    display: block;
    margin: 0 auto 32px;
    height: 28px;
    opacity: 0.9;
  }
  .auth-title {
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    color: var(--text);
  }
  .auth-sub {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .auth-sub a { color: var(--electric); text-decoration: none; }
  .auth-sub a:hover { text-decoration: underline; }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus {
    border-color: var(--electric);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1), 0 0 20px rgba(0,255,136,0.05);
  }
  .form-group input.error {
    border-color: var(--neon-pink);
    box-shadow: 0 0 0 3px rgba(255,68,170,0.1);
  }
  .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .form-error {
    color: var(--neon-pink);
    font-size: 12px;
    margin-top: 6px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .form-error.visible { display: block; }
  .auth-btn {
    width: 100%;
    padding: 16px;
    background: var(--electric);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 8px;
  }
  .auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,255,136,0.3), 0 8px 30px rgba(0,0,0,0.3);
  }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .global-error, .global-success {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .global-error {
    background: rgba(255,68,170,0.1);
    border: 1px solid rgba(255,68,170,0.3);
    color: var(--neon-pink);
  }
  .global-success {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--electric);
  }
  .global-error.visible, .global-success.visible { display: block; }
  .forgot-link {
    display: block;
    text-align: right;
    font-size: 13px;
    color: var(--text-dim);
    text-decoration: none;
    margin-top: -12px;
    margin-bottom: 20px;
  }
  .forgot-link:hover { color: var(--electric); }
  .auth-glow {
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  @media (max-width: 520px) {
    .auth-card { padding: 36px 24px; }
  }
</style>
</head>
<body>
<script src="/js/locale.js"></script>
<div class="noise"></div>
<div class="auth-glow"></div>

<div class="auth-page">
  <div class="auth-card">
    <a href="/"><img src="thapill-assets/logo.png" alt="THAPILL" class="auth-logo"></a>
    <h1 class="auth-title" id="authTitle">Welcome back</h1>
    <p class="auth-sub">Don't have an account? <a href="/register">Sign up</a></p>

    <div class="global-error" id="globalError"></div>
    <div class="global-success" id="globalSuccess"></div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
        <div class="form-error" id="email_error"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
        <div class="form-error" id="password_error"></div>
      </div>
      <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      <button type="submit" class="auth-btn" id="submitBtn">Log In</button>
    </form>
  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('verified') === '1') {
    const s = document.getElementById('globalSuccess');
    s.textContent = 'Email verified — you can now log in.';
    s.classList.add('visible');
  }

  const glyphs = 'ABCDEFGHJKMNPQRSTVWXYZ0123456789@#$%&';
  function scramble(el, final) {
    let frame = 0;
    const len = final.length;
    const interval = setInterval(() => {
      let out = '';
      for (let i = 0; i < len; i++) {
        out += frame > i * 2 ? final[i] : glyphs[Math.floor(Math.random() * glyphs.length)];
      }
      el.textContent = out;
      frame++;
      if (frame > len * 2 + 4) { el.textContent = final; clearInterval(interval); }
    }, 30);
  }
  scramble(document.getElementById('authTitle'), 'Welcome back');

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const globalError = document.getElementById('globalError');

  function clearErrors() {
    document.querySelectorAll('.form-error').forEach(e => { e.classList.remove('visible'); e.textContent = ''; });
    document.querySelectorAll('input.error').forEach(e => e.classList.remove('error'));
    globalError.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const data = Object.fromEntries(new FormData(form));

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const json = await res.json();

      if (!res.ok) {
        globalError.textContent = json.error || 'Login failed';
        globalError.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Log In';
        return;
      }

      const next = new URLSearchParams(window.location.search).get('next');
      try { await fetch('/api/cart/merge', { method: 'POST' }); } catch {}
      window.location.href = next || '/dashboard';
    } catch {
      globalError.textContent = 'Network error — please try again';
      globalError.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
})();
</script>
<script src="/js/chat.js"></script>
<script src="/js/cursor.js"></script>
</body>
</html>
