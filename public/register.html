<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAPILL — Create Account</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" type="image/png" sizes="32x32" href="/thapill-assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/thapill-assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 40px 20px;
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 460px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--electric), transparent);
  }
  .auth-logo {
    display: block;
    margin: 0 auto 32px;
    height: 28px;
    opacity: 0.9;
  }
  .auth-title {
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    color: var(--text);
  }
  .auth-sub {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .auth-sub a { color: var(--electric); text-decoration: none; }
  .auth-sub a:hover { text-decoration: underline; }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-group {
    margin-bottom: 20px;
    flex: 1;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus {
    border-color: var(--electric);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1), 0 0 20px rgba(0,255,136,0.05);
  }
  .form-group input.error {
    border-color: var(--neon-pink);
    box-shadow: 0 0 0 3px rgba(255,68,170,0.1);
  }
  .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .form-error {
    color: var(--neon-pink);
    font-size: 12px;
    margin-top: 6px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .form-error.visible { display: block; }
  .auth-btn {
    width: 100%;
    padding: 16px;
    background: var(--electric);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 8px;
  }
  .auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,255,136,0.3), 0 8px 30px rgba(0,0,0,0.3);
  }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .global-error {
    background: rgba(255,68,170,0.1);
    border: 1px solid rgba(255,68,170,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--neon-pink);
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .global-error.visible { display: block; }
  .auth-glow {
    position: fixed;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }
  .referral-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .referral-note span { color: var(--electric); }

  @media (max-width: 520px) {
    .form-row { flex-direction: column; gap: 0; }
    .auth-card { padding: 36px 24px; }
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="auth-glow"></div>

<div class="auth-page">
  <div class="auth-card">
    <a href="/"><img src="thapill-assets/logo.png" alt="THAPILL" class="auth-logo"></a>
    <h1 class="auth-title" id="authTitle">Create Account</h1>
    <p class="auth-sub">Already have an account? <a href="/login">Log in</a></p>

    <div class="global-error" id="globalError"></div>

    <form id="registerForm" autocomplete="off">
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" placeholder="Javed" required>
          <div class="form-error" id="first_name_error"></div>
        </div>
        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Khan" required>
          <div class="form-error" id="last_name_error"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
        <div class="form-error" id="email_error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+44 7XXX XXXXXX" required>
          <div class="form-error" id="phone_error"></div>
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country" name="country" required>
          <div class="form-error" id="country_error"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 characters" required minlength="8">
        <div class="form-error" id="password_error"></div>
      </div>
      <div class="form-group">
        <label for="referral_code">Referral Code <span style="color:var(--text-dim);text-transform:none;font-weight:400;">(optional)</span></label>
        <input type="text" id="referral_code" name="referral_code" placeholder="e.g. JAVED-PILL">
        <div class="referral-note" id="referralNote"></div>
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Create Account</button>
    </form>
  </div>
</div>

<script src="/js/countries.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const refCode = params.get('ref');
  if (refCode) {
    const input = document.getElementById('referral_code');
    input.value = refCode;
    document.getElementById('referralNote').innerHTML = 'Referral code <span>' + refCode + '</span> applied';
  }

  // Initialize the searchable country picker
  const countryInput = document.getElementById('country');
  if (window.Countries) window.Countries.picker(countryInput, { placeholder: 'Select country' });

  // Prefill country from session geo
  fetch('/api/geo').then(r => r.ok ? r.json() : null).then(d => {
    if (d && d.country && !countryInput.value) {
      countryInput.value = d.country;
      countryInput.dispatchEvent(new Event('change', { bubbles: true }));
    }
  }).catch(() => {});

  const glyphs = 'ABCDEFGHJKMNPQRSTVWXYZ0123456789@#$%&';
  function scramble(el, final) {
    let frame = 0;
    const len = final.length;
    const interval = setInterval(() => {
      let out = '';
      for (let i = 0; i < len; i++) {
        out += frame > i * 2 ? final[i] : glyphs[Math.floor(Math.random() * glyphs.length)];
      }
      el.textContent = out;
      frame++;
      if (frame > len * 2 + 4) { el.textContent = final; clearInterval(interval); }
    }, 30);
  }
  scramble(document.getElementById('authTitle'), 'Create Account');

  const form = document.getElementById('registerForm');
  const btn = document.getElementById('submitBtn');
  const globalError = document.getElementById('globalError');

  function showError(field, msg) {
    const input = document.getElementById(field);
    const err = document.getElementById(field + '_error');
    if (input) input.classList.add('error');
    if (err) { err.textContent = msg; err.classList.add('visible'); }
  }

  function clearErrors() {
    document.querySelectorAll('.form-error').forEach(e => { e.classList.remove('visible'); e.textContent = ''; });
    document.querySelectorAll('input.error').forEach(e => e.classList.remove('error'));
    globalError.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const data = Object.fromEntries(new FormData(form));
    let valid = true;

    if (!data.first_name.trim()) { showError('first_name', 'Required'); valid = false; }
    if (!data.last_name.trim()) { showError('last_name', 'Required'); valid = false; }
    if (!data.email.trim() || !data.email.includes('@')) { showError('email', 'Valid email required'); valid = false; }
    if (!data.phone || data.phone.trim().length < 6) { showError('phone', 'Valid phone required'); valid = false; }
    if (!data.country || data.country.trim().length !== 2) { showError('country', '2-letter code (e.g. GB)'); valid = false; }
    if (!data.password || data.password.length < 8) { showError('password', 'Min 8 characters'); valid = false; }

    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const json = await res.json();

      if (!res.ok) {
        globalError.textContent = json.error || 'Registration failed';
        globalError.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      const next = new URLSearchParams(window.location.search).get('next');
      // Merge any guest cart into the new account before redirecting
      try { await fetch('/api/cart/merge', { method: 'POST' }); } catch {}
      window.location.href = next || '/dashboard';
    } catch {
      globalError.textContent = 'Network error — please try again';
      globalError.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
})();
</script>
<script src="/js/chat.js"></script>
<script src="/js/cursor.js"></script>
</body>
</html>
