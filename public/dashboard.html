<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAPILL — Dashboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="thapill-assets/favicon-32.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .dash-page { min-height: 100vh; padding: 100px 48px 60px; position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

  /* Welcome header */
  .dash-welcome { margin-bottom: 40px; }
  .dash-welcome h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
  .dash-welcome h1 span { color: var(--electric); }
  .dash-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .uid-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--electric);
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    padding: 4px 12px;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .uid-badge::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
  .tier-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .tier-starter { color: var(--text-dim); background: rgba(85,85,106,0.15); border: 1px solid rgba(85,85,106,0.3); }
  .tier-locked-in { color: var(--electric); background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); }
  .tier-elite { color: var(--neon-purple); background: rgba(119,51,255,0.1); border: 1px solid rgba(119,51,255,0.3); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    transition: transform 0.3s, box-shadow 0.3s;
    opacity: 0;
    transform: translateY(30px);
  }
  .stat-card.visible { opacity: 1; transform: translateY(0); }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .stat-card-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
  .stat-card-value { font-size: 36px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-card-value.points { color: var(--neon-purple); }
  .stat-card-value.electric { color: var(--electric); }
  .stat-card-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-points-glow { text-shadow: 0 0 20px rgba(119,51,255,0.4); }

  /* Sections */
  .dash-section { margin-bottom: 40px; }
  .dash-section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .dash-section-title::before { content: '//'; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* Orders table */
  .orders-table { width: 100%; border-collapse: collapse; }
  .orders-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .orders-table td { padding: 14px 12px; border-bottom: 1px solid rgba(21,21,37,0.5); font-size: 14px; }
  .orders-table tr { transition: background 0.2s; }
  .orders-table tbody tr:hover { background: rgba(0,255,136,0.02); }
  .order-num { font-family: 'JetBrains Mono', monospace; color: var(--electric); font-size: 13px; }
  .status-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-pending { color: var(--neon-blue); background: rgba(68,136,255,0.1); }
  .status-paid, .status-processing { color: #ffaa00; background: rgba(255,170,0,0.1); }
  .status-shipped { color: var(--electric-bright); background: rgba(0,255,136,0.08); }
  .status-delivered { color: var(--electric); background: rgba(0,255,136,0.15); }
  .status-cancelled { color: var(--neon-pink); background: rgba(255,68,170,0.1); }

  /* Points feed */
  .points-feed { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
  .points-feed::-webkit-scrollbar { width: 4px; }
  .points-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .points-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
  }
  .points-item-desc { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .points-amount { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 15px; }
  .points-earned { color: var(--electric); }
  .points-spent { color: var(--neon-pink); }

  /* Quick actions */
  .quick-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .quick-btn {
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  .quick-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .quick-btn.primary { background: var(--electric); color: var(--bg); border-color: var(--electric); }
  .quick-btn.primary:hover { box-shadow: 0 0 25px rgba(0,255,136,0.3); }

  /* Empty states */
  .empty-state {
    text-align: center; padding: 40px;
    color: var(--text-dim); font-size: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px;
  }
  .empty-state a { color: var(--electric); text-decoration: none; }

  /* Dashboard nav */
  .dash-nav { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 16px 48px; background: rgba(3,3,6,0.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(30px); }
  .dash-nav-logo { height: 22px; opacity: 0.9; }
  .dash-nav-right { display: flex; align-items: center; gap: 16px; }
  .dash-nav-user {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim);
  }
  .dash-nav-logout {
    font-size: 13px; color: var(--text-dim); text-decoration: none; cursor: pointer;
    background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif; transition: color 0.2s, border-color 0.2s;
  }
  .dash-nav-logout:hover { color: var(--neon-pink); border-color: rgba(255,68,170,0.3); }

  /* Two column layout for bottom sections */
  .dash-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Breathing glow on high-value points */
  .breathing-glow { animation: breathGlow 3s ease-in-out infinite; }
  @keyframes breathGlow { 0%, 100% { text-shadow: 0 0 15px rgba(119,51,255,0.3); } 50% { text-shadow: 0 0 30px rgba(119,51,255,0.6); } }

  /* Loading skeleton */
  .skeleton { background: linear-gradient(90deg, var(--card) 25%, rgba(21,21,37,0.8) 50%, var(--card) 75%); background-size: 200% 100%; animation: skeletonPulse 1.5s ease-in-out infinite; border-radius: 8px; }
  @keyframes skeletonPulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skeleton-card { height: 110px; border-radius: 14px; }
  .skeleton-row { height: 52px; margin-bottom: 8px; }

  @media (max-width: 768px) {
    .dash-page { padding: 90px 20px 40px; }
    .dash-nav { padding: 14px 20px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .dash-columns { grid-template-columns: 1fr; }
    .quick-actions { flex-direction: column; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<nav class="dash-nav">
  <a href="/"><img src="thapill-assets/logo.png" alt="THAPILL" class="dash-nav-logo"></a>
  <div class="dash-nav-right">
    <span class="dash-nav-user" id="navUser"></span>
    <button class="dash-nav-logout" id="logoutBtn">Log Out</button>
  </div>
</nav>

<div class="dash-page" id="dashContent">
  <!-- Skeleton loading state -->
  <div id="skeleton">
    <div style="margin-bottom:40px;">
      <div class="skeleton" style="width:300px;height:36px;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:200px;height:20px;"></div>
    </div>
    <div class="stats-grid">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
    <div class="skeleton skeleton-row"></div>
  </div>

  <!-- Real content (hidden until loaded) -->
  <div id="dashReal" style="display:none;">
    <div class="dash-welcome">
      <h1 id="welcomeTitle"></h1>
      <div class="dash-meta">
        <span class="uid-badge" id="uidBadge"></span>
        <span class="tier-badge" id="tierBadge"></span>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card" data-delay="0">
        <div class="stat-card-label">Total Orders</div>
        <div class="stat-card-value" id="statOrders" data-target="0">0</div>
      </div>
      <div class="stat-card" data-delay="100">
        <div class="stat-card-label">Points Balance</div>
        <div class="stat-card-value points" id="statPoints" data-target="0">0</div>
      </div>
      <div class="stat-card" data-delay="200">
        <div class="stat-card-label">Referrals</div>
        <div class="stat-card-value" id="statReferrals" data-target="0">0</div>
      </div>
      <div class="stat-card" data-delay="300">
        <div class="stat-card-label">Subscription</div>
        <div class="stat-card-value electric" id="statSub">—</div>
        <div class="stat-card-sub" id="statSubLabel"></div>
      </div>
    </div>

    <div class="dash-columns">
      <div class="dash-section">
        <div class="dash-section-title">Recent Orders</div>
        <div id="ordersContainer"></div>
      </div>
      <div class="dash-section">
        <div class="dash-section-title">Points Activity</div>
        <div id="pointsContainer"></div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Quick Actions</div>
      <div class="quick-actions">
        <a href="/#pricing" class="quick-btn primary">Order thaPill</a>
        <button class="quick-btn" id="shareRefBtn">Share Referral Link</button>
        <a href="/rewards" class="quick-btn">View Rewards</a>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  async function load() {
    try {
      const res = await fetch('/api/dashboard');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      render(data);
    } catch {
      document.getElementById('skeleton').innerHTML = '<div class="empty-state">Failed to load dashboard. <a href="/login">Try logging in again.</a></div>';
    }
  }

  function render(data) {
    const { user, stats, recentOrders, pointsHistory } = data;

    document.getElementById('navUser').textContent = user.email;
    document.getElementById('skeleton').style.display = 'none';
    document.getElementById('dashReal').style.display = 'block';

    // Welcome
    const titleEl = document.getElementById('welcomeTitle');
    scramble(titleEl, 'Welcome back, ' + user.first_name);

    document.getElementById('uidBadge').textContent = user.uid;

    const tierBadge = document.getElementById('tierBadge');
    const tierName = user.tier === 'locked-in' ? 'Locked In' : user.tier.charAt(0).toUpperCase() + user.tier.slice(1);
    tierBadge.textContent = tierName;
    tierBadge.className = 'tier-badge tier-' + user.tier;

    // Stats with count-up
    animateCount('statOrders', stats.totalOrders);
    animateCount('statPoints', stats.pointsBalance);
    animateCount('statReferrals', stats.referrals);

    const pointsEl = document.getElementById('statPoints');
    if (stats.pointsBalance >= 500) pointsEl.classList.add('breathing-glow');

    const subEl = document.getElementById('statSub');
    const subLabel = document.getElementById('statSubLabel');
    if (stats.hasActiveSubscription) {
      subEl.textContent = 'Active';
      subLabel.textContent = 'Locked in monthly';
    } else {
      subEl.textContent = '—';
      subEl.style.color = 'var(--text-dim)';
      subLabel.textContent = 'No active plan';
    }

    // Stagger card reveal
    document.querySelectorAll('.stat-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), 100 + i * 120);
    });

    // Orders
    const ordersEl = document.getElementById('ordersContainer');
    if (recentOrders.length === 0) {
      ordersEl.innerHTML = '<div class="empty-state">No orders yet. <a href="/#pricing">Get your first bottle.</a></div>';
    } else {
      let html = '<table class="orders-table"><thead><tr><th>Order</th><th>Date</th><th>Status</th><th>Total</th></tr></thead><tbody>';
      for (const o of recentOrders) {
        const date = new Date(o.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const total = '£' + (o.total_pence / 100).toFixed(2);
        html += '<tr><td><span class="order-num">' + o.order_number + '</span></td><td>' + date + '</td><td><span class="status-badge status-' + o.status + '">' + o.status + '</span></td><td>' + total + '</td></tr>';
      }
      html += '</tbody></table>';
      ordersEl.innerHTML = html;
    }

    // Points
    const pointsContEl = document.getElementById('pointsContainer');
    if (pointsHistory.length === 0) {
      pointsContEl.innerHTML = '<div class="empty-state">No points activity yet.</div>';
    } else {
      let html = '<div class="points-feed">';
      for (const p of pointsHistory) {
        const isPositive = p.amount > 0;
        const sign = isPositive ? '+' : '';
        const cls = isPositive ? 'points-earned' : 'points-spent';
        const date = new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        html += '<div class="points-item"><div><div>' + p.type + '</div><div class="points-item-desc">' + (p.description || '') + ' · ' + date + '</div></div><div class="points-amount ' + cls + '">' + sign + p.amount + '</div></div>';
      }
      html += '</div>';
      pointsContEl.innerHTML = html;
    }

    // Referral share
    document.getElementById('shareRefBtn').addEventListener('click', () => {
      const link = window.location.origin + '/?ref=' + user.referral_code;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.getElementById('shareRefBtn');
        btn.textContent = 'Copied!';
        btn.style.borderColor = 'var(--electric)';
        btn.style.color = 'var(--electric)';
        setTimeout(() => { btn.textContent = 'Share Referral Link'; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
      });
    });
  }

  // Count-up animation
  function animateCount(id, target) {
    const el = document.getElementById(id);
    if (!target) { el.textContent = '0'; return; }
    const duration = 1200;
    const start = performance.now();
    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(eased * target).toLocaleString();
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // Text scramble
  const glyphs = 'ABCDEFGHJKMNPQRSTVWXYZ0123456789@#$%&';
  function scramble(el, final) {
    let frame = 0;
    const len = final.length;
    const interval = setInterval(() => {
      let out = '';
      for (let i = 0; i < len; i++) {
        out += frame > i * 2 ? final[i] : glyphs[Math.floor(Math.random() * glyphs.length)];
      }
      el.textContent = out;
      frame++;
      if (frame > len * 2 + 4) { el.textContent = final; clearInterval(interval); }
    }, 25);
  }

  // 3D tilt on stat cards
  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.stat-card').forEach((card) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      const dist = Math.sqrt(Math.pow(e.clientX - (rect.left + rect.width/2), 2) + Math.pow(e.clientY - (rect.top + rect.height/2), 2));
      if (dist < 300) {
        card.style.transform = 'translateY(-2px) perspective(600px) rotateX(' + (-y * 8) + 'deg) rotateY(' + (x * 8) + 'deg)';
      } else {
        card.style.transform = '';
      }
    });
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  });

  load();
})();
</script>
<script src="/js/cart.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/toast.js"></script>
</body>
</html>
