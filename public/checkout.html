<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAPILL — Checkout</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" type="image/png" sizes="32x32" href="/thapill-assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/thapill-assets/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .checkout-page { min-height: 100vh; padding: 40px 20px; display: flex; justify-content: center; position: relative; z-index: 1; }
  .checkout-wrap { display: grid; grid-template-columns: 1fr 380px; gap: 40px; max-width: 900px; width: 100%; margin-top: 40px; }
  .checkout-main h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .checkout-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
  .checkout-sub a { color: var(--electric); text-decoration: none; }
  .section-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; margin-bottom: 16px; font-weight: 500; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace; }
  .form-group input { width: 100%; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
  .form-group input:focus { border-color: var(--electric); box-shadow: 0 0 0 3px rgba(0,255,136,0.1); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  /* Order summary sidebar */
  .order-summary { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; position: sticky; top: 40px; }
  .order-summary h3 { font-size: 16px; margin-bottom: 20px; }
  .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(21,21,37,0.6); font-size: 14px; }
  .summary-item-name { flex: 1; }
  .summary-item-qty { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; margin: 0 12px; }
  .summary-item-price { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; color: var(--text-dim); }
  .summary-total { display: flex; justify-content: space-between; padding: 16px 0 0; margin-top: 8px; border-top: 1px solid var(--border); font-size: 20px; font-weight: 700; }
  .summary-total span:last-child { color: var(--electric); }

  .checkout-btn { width: 100%; padding: 16px; background: var(--electric); color: var(--bg); border: none; border-radius: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 20px; }
  .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,255,136,0.3); }
  .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .guest-note { background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.15); border-radius: 10px; padding: 14px 18px; margin-bottom: 24px; font-size: 13px; color: var(--text-dim); }
  .guest-note a { color: var(--electric); text-decoration: none; }

  .global-error { background: rgba(255,68,170,0.1); border: 1px solid rgba(255,68,170,0.3); border-radius: 10px; padding: 12px 16px; color: var(--neon-pink); font-size: 13px; margin-bottom: 20px; display: none; font-family: 'JetBrains Mono', monospace; }
  .global-error.visible { display: block; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); text-decoration: none; font-size: 13px; margin-bottom: 24px; transition: color 0.2s; }
  .back-link:hover { color: var(--electric); }

  .checkout-logo { display: block; margin: 0 auto 24px; height: 24px; opacity: 0.8; }

  @media (max-width: 768px) {
    .checkout-wrap { grid-template-columns: 1fr; }
    .order-summary { position: static; }
  }
</style>
</head>
<body>
<script src="/js/locale.js"></script>
<div class="noise"></div>

<div class="checkout-page">
  <div class="checkout-wrap">
    <div class="checkout-main">
      <a href="/"><img src="thapill-assets/logo.png" alt="THAPILL" class="checkout-logo"></a>
      <a href="/" class="back-link">&larr; Back to shop</a>
      <h1>Checkout</h1>
      <p class="checkout-sub" id="checkoutSub">Complete your order below. No account needed.</p>

      <div class="global-error" id="globalError"></div>

      <div class="guest-note" id="guestNote">
        Checking out as a guest. <a href="/register">Create an account</a> to earn points and track orders.
      </div>

      <form id="checkoutForm">
        <div class="section-label">Contact</div>
        <div class="form-group" id="guestEmailGroup">
          <label for="email">Email (for order confirmation)</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="section-label">Shipping Address</div>
        <div class="form-group">
          <label for="line1">Address Line 1</label>
          <input type="text" id="line1" name="line1" required placeholder="123 Main Street">
        </div>
        <div class="form-group">
          <label for="line2">Address Line 2 <span style="color:var(--text-dim);text-transform:none;">(optional)</span></label>
          <input type="text" id="line2" name="line2" placeholder="Flat 4">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required placeholder="London">
          </div>
          <div class="form-group">
            <label for="postcode">Postcode</label>
            <input type="text" id="postcode" name="postcode" required placeholder="SW1A 1AA">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="county">County <span style="color:var(--text-dim);text-transform:none;">(optional)</span></label>
            <input type="text" id="county" name="county" placeholder="Greater London">
          </div>
          <div class="form-group">
            <label for="country">Country</label>
            <input type="text" id="country" name="country" required>
          </div>
        </div>

        <button type="submit" class="checkout-btn" id="payBtn">Pay Now</button>
      </form>
    </div>

    <div class="order-summary" id="orderSummary">
      <h3>Order Summary</h3>
      <div id="summaryItems"></div>
      <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal"></span></div>
      <div class="summary-row"><span id="summaryShipLabel">Shipping</span><span id="summaryShipping">—</span></div>
      <div class="summary-total"><span>Total</span><span id="summaryTotal"></span></div>
    </div>
  </div>
</div>

<script src="/js/countries.js"></script>
<script>
(function() {
  const fmt = (p) => (window.Locale && window.Locale.price) ? window.Locale.price(p) : ('£' + (p / 100).toFixed(2));
  let cartSubtotal = 0;
  let lastCart = null;
  let lastShipping = null;

  function renderItemsList(cart) {
    if (!cart) return;
    document.getElementById('summaryItems').innerHTML = cart.items.map(i => `
      <div class="summary-item">
        <span class="summary-item-name">${i.name}</span>
        <span class="summary-item-qty">&times;${i.quantity}</span>
        <span class="summary-item-price">${fmt(i.price_pence * i.quantity)}</span>
      </div>
    `).join('');
    document.getElementById('summarySubtotal').textContent = fmt(cart.total_pence);
  }

  async function refreshShipping() {
    const countryInput = document.getElementById('country');
    const code = (countryInput && countryInput.value) ? countryInput.value : '';
    const res = await fetch('/api/shipping' + (code ? '?country=' + encodeURIComponent(code) : '')).catch(() => null);
    const rule = res && res.ok ? await res.json() : { price_pence: 0, blocked: 0 };
    lastShipping = rule;
    const ship = rule.price_pence || 0;
    document.getElementById('summaryShipLabel').textContent = 'Shipping' + (rule.country ? ' · ' + rule.country : '');
    const shipEl = document.getElementById('summaryShipping');
    if (rule.blocked) {
      shipEl.textContent = 'Not available';
      shipEl.style.color = 'var(--neon-pink)';
      document.getElementById('payBtn').disabled = true;
      const err = document.getElementById('globalError');
      err.textContent = rule.message || `thaPill hasn't plugged into ${rule.country} yet — we'll DM the drop when we do.`;
      err.classList.add('visible');
    } else if (ship <= 0) {
      shipEl.textContent = 'Free';
      shipEl.style.color = 'var(--electric)';
      document.getElementById('payBtn').disabled = false;
      document.getElementById('globalError').classList.remove('visible');
    } else {
      shipEl.textContent = fmt(ship);
      shipEl.style.color = 'var(--text)';
      document.getElementById('payBtn').disabled = false;
      document.getElementById('globalError').classList.remove('visible');
    }
    document.getElementById('summaryTotal').textContent = fmt(cartSubtotal + (rule.blocked ? 0 : ship));
  }

  async function init() {
    // Check auth state
    const meRes = await fetch('/api/auth/me').catch(() => null);
    if (meRes && meRes.ok) {
      document.getElementById('guestNote').style.display = 'none';
      document.getElementById('checkoutSub').textContent = 'Complete your order below.';
      document.getElementById('guestEmailGroup').style.display = 'none';
      document.getElementById('email').removeAttribute('required');
    }

    // Load cart
    const cartRes = await fetch('/api/cart');
    const cart = await cartRes.json();
    if (!cart.items.length) {
      window.location.href = '/';
      return;
    }
    cartSubtotal = cart.total_pence;
    lastCart = cart;
    renderItemsList(cart);

    // Wire up the searchable country picker + shipping recompute
    const countryInput = document.getElementById('country');
    if (countryInput && window.Countries) window.Countries.picker(countryInput, { placeholder: 'Select country' });
    // Prefill from geo if empty
    const geo = await fetch('/api/geo').then(r => r.ok ? r.json() : null).catch(() => null);
    if (countryInput && geo && geo.country && !countryInput.value) {
      countryInput.value = geo.country;
      countryInput.dispatchEvent(new Event('change', { bubbles: true }));
    }
    if (countryInput) countryInput.addEventListener('change', refreshShipping);

    await refreshShipping();

    // Cancelled?
    if (new URLSearchParams(window.location.search).get('cancelled') === '1') {
      const err = document.getElementById('globalError');
      err.textContent = 'Payment was cancelled. You can try again.';
      err.classList.add('visible');
    }
  }

  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const emailVal = document.getElementById('email').value.trim();
    const emailGroupVisible = document.getElementById('guestEmailGroup').style.display !== 'none';
    if (emailGroupVisible && (!emailVal || !emailVal.includes('@'))) {
      const err = document.getElementById('globalError');
      err.textContent = 'Enter a valid email so we can send your order confirmation.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Pay Now';
      return;
    }
    const address = {
      email: emailVal || null,
      line1: document.getElementById('line1').value,
      line2: document.getElementById('line2').value || null,
      city: document.getElementById('city').value,
      postcode: document.getElementById('postcode').value,
      county: document.getElementById('county').value || null,
      country: (document.getElementById('country').value || 'GB').toUpperCase(),
    };

    try {
      const res = await fetch('/api/checkout/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address }),
      });
      const data = await res.json();

      if (!res.ok) {
        const err = document.getElementById('globalError');
        err.textContent = data.error || 'Checkout failed';
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Pay Now';
        return;
      }

      window.location.href = data.url;
    } catch {
      const err = document.getElementById('globalError');
      err.textContent = 'Network error — please try again.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Pay Now';
    }
  });

  // Re-render cart line items + totals when user switches currency/language
  document.addEventListener('locale:change', () => { renderItemsList(lastCart); refreshShipping(); });
  document.addEventListener('locale:ready',  () => { renderItemsList(lastCart); refreshShipping(); });

  init();
})();
</script>
<script src="/js/chat.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/cursor.js"></script>
</body>
</html>
