<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAPILL — 404</title>
<link rel="icon" type="image/png" sizes="32x32" href="/thapill-assets/favicon-32.png">
<link rel="stylesheet" href="/css/style.css">
<style>
  .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; text-align: center; padding: 40px 20px; }
  .error-code { font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: 700; color: var(--electric); line-height: 1; margin-bottom: 16px; text-shadow: 0 0 40px rgba(0,255,136,0.3); }
  .error-msg { font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .error-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }
  .error-btn { display: inline-block; padding: 14px 32px; background: var(--electric); color: var(--bg); border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; transition: transform 0.2s, box-shadow 0.2s; }
  .error-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,255,136,0.3); }
  .glow { position: fixed; top: 50%; left: 50%; width: 400px; height: 400px; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%); pointer-events: none; z-index: 0; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow"></div>
<div class="error-page">
  <div>
    <div id="pilly-404" style="display:flex;justify-content:center;margin-bottom:24px;"></div>
    <div class="error-code">404</div>
    <div class="error-msg">This page took the wrong pill.</div>
    <div class="error-sub">Pilly's still sleeping on this one. Let's get you back home.</div>
    <a href="/" class="error-btn">Back to Home</a>
  </div>
</div>
<script src="/js/pilly.js"></script>
<script>
  if (window.Pilly) window.Pilly.sleepyAt(document.getElementById('pilly-404'), { size: 170 });
</script>
</body>
</html>
